<section class="admin-auth px-3 py-4 md:px-4 md:py-5">
  <div class="admin-auth__panel" aria-label="Acceso al panel administrador">
    <article class="admin-auth__intro" aria-hidden="true">
      <p class="admin-auth__kicker m-0">Acceso seguro</p>
      <h1 class="admin-auth__title m-0">Panel de administracion</h1>
      <p class="admin-auth__copy m-0">
        Gestiona inventario y operaciones del negocio desde una sola vista.
      </p>
    </article>

    <article class="admin-auth__card" aria-label="Formulario de inicio de sesion">
      <form class="admin-auth__form" [formGroup]="form" (ngSubmit)="login()">
        <div class="admin-auth__heading">
          <h2 class="m-0">Iniciar sesion</h2>
          <p class="m-0">Ingresa con tu cuenta para continuar.</p>
        </div>

        <div class="admin-auth__field">
          <label for="admin-email">Correo</label>
          <input
            id="admin-email"
            pInputText
            type="email"
            autocomplete="email"
            formControlName="email"
            placeholder="admin@dominio.com"
            [class.p-invalid]="hasError('email')"
          />
          @if (hasError('email')) {
            <small class="p-error">Ingresa un correo valido.</small>
          }
        </div>

        <div class="admin-auth__field">
          <label for="admin-password">Contrasena</label>
          <p-password
            inputId="admin-password"
            formControlName="password"
            [toggleMask]="true"
            [feedback]="false"
            [inputStyleClass]="hasError('password') ? 'p-invalid w-full' : 'w-full'"
            placeholder="********"
          ></p-password>
          @if (hasError('password')) {
            <small class="p-error">La contrasena debe tener al menos 6 caracteres.</small>
          }
        </div>

        <button
          pButton
          type="submit"
          icon="pi pi-sign-in"
          [label]="isSubmitting() ? 'Validando acceso...' : 'Entrar al panel'"
          [loading]="isSubmitting()"
          [disabled]="isSubmitting()"
          class="w-full"
        ></button>
      </form>
    </article>
  </div>
</section>
