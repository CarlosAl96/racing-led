<header class="header-shell px-3 py-2 md:px-2 md:py-2">
  <div class="flex align-items-center justify-content-between gap-3 pr-4">
    <div class="flex align-items-center gap-3 min-w-0">
      <img
        src="assets/logo.png"
        width="120"
        height="58"
        alt="Logo Racing Led"
        class="header-logo"
      />
      <h1 class="header-title m-0 white-space-nowrap overflow-hidden text-overflow-ellipsis">
        {{ brandTitle }}
      </h1>
    </div>

    <div class="header-actions">
      @if (isCatalogFilterToggleVisible()) {
        <button
          pButton
          type="button"
          icon="pi pi-search"
          [rounded]="true"
          [text]="true"
          class="catalog-filter-button"
          [class.is-active]="isCatalogFiltersOpen()"
          [attr.aria-label]="
            isCatalogFiltersOpen() ? 'Ocultar filtros del catálogo' : 'Mostrar filtros del catálogo'
          "
          (click)="toggleCatalogFilters()"
        ></button>
      }

      <span
        class="cart-button-wrap p-overlay-badge"
        pBadge
        [value]="cartCount()"
        severity="secondary"
        [badgeDisabled]="cartCount() === 0"
      >
        <button
          pButton
          type="button"
          icon="pi pi-shopping-cart"
          [rounded]="true"
          [text]="true"
          class="cart-button"
          [class.is-active]="isCartOpen()"
          [class.is-pulsing]="isCartPulsing()"
          [attr.aria-label]="
            isCartOpen() ? 'Cerrar carrito de cotización' : 'Abrir carrito de cotización'
          "
          (click)="toggleCart()"
        ></button>
      </span>
    </div>
  </div>
</header>
