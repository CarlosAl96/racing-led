<div class="catalog-shell">
  <div #headerHost>
    <app-header></app-header>
  </div>

  <main class="catalog-content" [style.--catalog-header-offset.px]="headerHeight()" aria-label="Contenido del catalogo">
    <router-outlet></router-outlet>
  </main>

  <app-shopping-cart mode="mobile" [headerOffset]="headerHeight()"></app-shopping-cart>
  <a
    pButton
    href="https://wa.me/584247392133?text=hola%20Brandon"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Contactar por WhatsApp"
    icon="pi pi-whatsapp"
    [rounded]="true"
    severity="success"
    class="fab-whatsapp"
  ></a>
  <app-footer class="catalog-footer"></app-footer>
</div>
