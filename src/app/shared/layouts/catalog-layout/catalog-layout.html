<div class="catalog-shell">
  <div #headerHost>
    <app-header></app-header>
  </div>

  <main class="catalog-content" [style.--catalog-header-offset.px]="headerHeight()" aria-label="Contenido del catalogo">
    <router-outlet></router-outlet>
  </main>

  <app-shopping-cart mode="mobile" [headerOffset]="headerHeight()"></app-shopping-cart>
  <a
    pButton
    href="https://wa.me/584247027005?text=Hola%2C%20necesito%20ayuda%20con%20mi%20cotizacion%20de%20repuestos%20Racing%20Led.%20%C2%BFMe%20pueden%20asistir%2C%20por%20favor%3F"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Contactar por WhatsApp para ayuda y soporte"
    icon="pi pi-whatsapp"
    [rounded]="true"
    class="fab-whatsapp"
    [class.is-pulsing]="isFabPulsing()"
  ></a>
  <app-footer class="catalog-footer"></app-footer>
</div>
