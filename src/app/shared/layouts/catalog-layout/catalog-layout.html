<div class="catalog-shell">
  <div #headerHost>
    <app-header></app-header>
  </div>

  <main class="catalog-content" [style.--catalog-header-offset.px]="headerHeight()" aria-label="Contenido del catalogo">
    <router-outlet></router-outlet>
  </main>

  <app-shopping-cart mode="mobile" [headerOffset]="headerHeight()"></app-shopping-cart>
  <p-button icon="pi pi-whatsapp" [rounded]="true" severity="success" class="fab-bottom-right" />
  <app-footer class="catalog-footer"></app-footer>
</div>
